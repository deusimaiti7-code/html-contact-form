<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>

<body>
    <form action="/action.php">
        <h2>CONTACT US</h2>
        <hr>
        What is your name?
        <br>
        <input type="text" placeholder="First name">
        <input type="text" placeholder="Middle name">
        <input type="text" placeholder="Last name">
        <br>
        <br>
        What is your email id?
        <br>
        <input type="email" placeholder="Enter your email(e.g @gmail.com)">
        <br>
        <br>
        What are you?
        <br>
        <select name="what are you?" >
            <option value="1st year student">1st year student</option>
            <option value="2nd year student">2nd year student</option>
            <option value="3rd year student">3rd year student</option>
            <option value="4th year student">4th year student</option>
            <option value="Other">Other</option>

        </select>
        <br>
        <br>
        What kind of Query do you have?
        <br>
        <select name="Query">
            <option value="Project">Project</option> 
            <option value="Academic">Academic</option>
            <option value="Collaborations">Collaborations</option> 
            <option value="Awards">Awards</option>
            <option value="Gerneral">General</option>
            <option value="Others">Others</option>    
        </select>
        <br>
        <br>
        <textarea name="Query" placeholder="Type your Query here" rows="15"></textarea>
        <br>
        <input type="Submit" value="Submit">
        


    </form>
    <hr>
    <p>&copy; Student Learning Hub 2026 </p>
    

</body>

</html>
